kind = "web"
previewPath = "/"
title = "Wander AI Auto Dev Config"
version = "1.0.0"
id = "artifacts/wander-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25111

[services.development]
run = "pnpm --filter @workspace/wander-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wander-ai", "run", "build" ]
publicDir = "artifacts/wander-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25111"
BASE_PATH = "/"
